<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glance</title>
  <link rel="stylesheet" href="app.css" />
</head>
<body>
  <div id="app">
    <!-- 自绘标题栏(可拖动) -->
    <header class="titlebar" id="titlebar">
      <div class="tb-left">
        <span class="brand">
          <svg class="brand-ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
          Glance
        </span>
      </div>
      <div class="tb-drag" id="dragRegion"></div>
      <div class="tb-right">
        <button class="icon-btn" id="themeBtn" title="切换日间 / 夜间">
          <svg class="ico ico-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="4.2"/><line x1="12" y1="2.5" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="21.5"/><line x1="2.5" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="21.5" y2="12"/><line x1="5.2" y1="5.2" x2="6.9" y2="6.9"/><line x1="17.1" y1="17.1" x2="18.8" y2="18.8"/><line x1="5.2" y1="18.8" x2="6.9" y2="17.1"/><line x1="17.1" y1="6.9" x2="18.8" y2="5.2"/></svg>
          <svg class="ico ico-moon" viewBox="0 0 24 24"><path d="M20 14.5A8 8 0 0 1 9.5 4 7 7 0 1 0 20 14.5z"/></svg>
        </button>
        <div class="win-controls">
          <button class="win-btn" id="winMin" title="最小化"><svg viewBox="0 0 24 24"><line x1="6" y1="12" x2="18" y2="12"/></svg></button>
          <button class="win-btn" id="winMax" title="最大化 / 还原"><svg viewBox="0 0 24 24"><rect x="6" y="6" width="12" height="12" rx="1.5"/></svg></button>
          <button class="win-btn close" id="winClose" title="隐藏 (Esc)"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
        </div>
      </div>
    </header>

    <!-- 搜索框 -->
    <div class="searchbar" id="searchbar">
      <svg class="icon-search" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <div class="scope-chip hidden" id="scopeChip" title="当前搜索范围">
        <svg viewBox="0 0 24 24"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
        <span id="scopeName"></span>
        <button id="scopeClear" title="清除范围,改为全局搜索"><svg viewBox="0 0 24 24"><line x1="6" y1="6" x2="18" y2="18"/><line x1="18" y1="6" x2="6" y2="18"/></svg></button>
      </div>
      <input id="q" type="text" autocomplete="off" autocorrect="off" spellcheck="false"
             placeholder="搜索文件…" />
    </div>

    <div id="banner" class="banner hidden"></div>
    <main id="results"></main>

    <div id="empty" class="empty hidden">
      <svg viewBox="0 0 24 24" class="empty-icon"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <div class="empty-title"></div>
      <div class="empty-sub"></div>
    </div>

    <footer id="footer">
      <span id="count" class="count"></span>
      <span class="hints">
        <kbd>↑</kbd><kbd>↓</kbd> 选择 <span class="sep">·</span>
        <kbd>↵</kbd> 打开 <span class="sep">·</span>
        <kbd>Ctrl</kbd><kbd>↵</kbd> 定位 <span class="sep">·</span>
        <kbd>Ctrl</kbd><kbd>C</kbd> 复制 <span class="sep">·</span>
        <kbd>Esc</kbd> 隐藏
      </span>
    </footer>
  </div>

  <!-- 8 向缩放手柄 -->
  <div class="resize-handle rh-n"></div><div class="resize-handle rh-s"></div>
  <div class="resize-handle rh-w"></div><div class="resize-handle rh-e"></div>
  <div class="resize-handle rh-nw"></div><div class="resize-handle rh-ne"></div>
  <div class="resize-handle rh-sw"></div><div class="resize-handle rh-se"></div>

  <div id="toast" class="toast"></div>
  <script src="app.js"></script>
</body>
</html>
